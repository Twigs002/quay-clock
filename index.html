<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0F1E3C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Quay Clock">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<title>Quay 1 — Clock In / Out</title>
</head>
<body>
<div class="app" id="app">
  <header class="brand-bar">
    <div class="brand-lockup">
      <div class="brand-q">Q1</div>
      <div>
        <div class="brand-name">Quay 1</div>
        <div class="brand-sub">Clock In / Out</div>
      </div>
    </div>
    <div class="clock" id="liveClock">—</div>
  </header>

  <main class="content" id="content">
    <div class="loading">Loading roster…</div>
  </main>

  <footer class="foot">
    <span id="versionTag">v0.1</span>
    <span id="connStatus" class="conn-ok">●&nbsp;online</span>
  </footer>
</div>

<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
