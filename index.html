<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#3D5BA6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Quay Clock">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Permanent+Marker&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<title>Quay 1 — Clock In / Out</title>
</head>
<body>
<div id="app">
  <div class="loading">Loading…</div>
</div>

<script src="quay-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script>
  window.sb = window.supabase.createClient(window.QUAY_CFG.SUPABASE_URL, window.QUAY_CFG.SUPABASE_ANON_KEY);
</script>
<script src="quay-data.js"></script>
<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(reg => {
      // Show a one-tap "Refresh" pill when a newly shipped version has
      // installed, so staff pick up changes without fully closing the app.
      function offerUpdate() {
        if (document.getElementById('swUpdate')) return;
        var bar = document.createElement('div');
        bar.id = 'swUpdate';
        bar.className = 'sw-update';
        bar.innerHTML =
          '<span class="sw-update-txt">Update available</span>' +
          '<button class="sw-update-btn" type="button">Refresh</button>' +
          '<button class="sw-update-x" type="button" aria-label="Dismiss">×</button>';
        bar.querySelector('.sw-update-btn').addEventListener('click', function () {
          window.location.reload();
        });
        bar.querySelector('.sw-update-x').addEventListener('click', function () {
          bar.remove();
        });
        document.body.appendChild(bar);
      }
      // An update finished installing before this page loaded.
      if (reg.waiting && navigator.serviceWorker.controller) offerUpdate();
      // A new version installs during this session.
      reg.addEventListener('updatefound', function () {
        var nw = reg.installing;
        if (!nw) return;
        nw.addEventListener('statechange', function () {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) offerUpdate();
        });
      });
      // PWAs are usually reopened (backgrounded), not reloaded — re-check for
      // a new version each time the app becomes visible again.
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') reg.update().catch(function () {});
      });
    }).catch(function () {});
  }
</script>
</body>
</html>
